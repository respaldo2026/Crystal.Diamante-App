name: Conversation Followups

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: conversation-followups
  cancel-in-progress: false

jobs:
  run-followups:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate required secrets
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$APP_BASE_URL" || (echo "Missing GitHub secret: APP_BASE_URL" && exit 1)
          test -n "$CRON_SECRET" || (echo "Missing GitHub secret: CRON_SECRET" && exit 1)

      - name: Trigger conversation followups
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_BASE_URL/api/cron/conversation-followups"