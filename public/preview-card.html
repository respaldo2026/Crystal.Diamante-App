<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview – Tarjeta Logro</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    h2 {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      width: 340px;
      aspect-ratio: 9 / 16;
      background-image: url('quiz-card-bg.png');
      background-size: cover;
      background-position: center top;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 24px 32px;
      box-sizing: border-box;
    }
    .overlay {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(to bottom, transparent 45%, rgba(10,5,30,0.82) 68%, rgba(10,5,30,0.96) 100%);
      pointer-events: none;
    }
    .content {
      width: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .score-circle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
      box-shadow: 0 0 48px rgba(255,215,0,0.7), 0 6px 28px rgba(0,0,0,0.5);
    }
    .score-number {
      color: #1a0533;
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
    }
    .score-denom {
      color: rgba(26,5,51,0.65);
      font-size: 13px;
      font-weight: 700;
    }
    .title {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 4px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
      text-align: center;
    }
    .quiz-name {
      color: rgba(255,215,0,0.95);
      font-size: 13px;
      font-weight: 600;
      font-style: italic;
      text-align: center;
    }
    .pct-panel {
      width: 100%;
      padding: 12px 16px 10px;
      border-radius: 14px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,215,0,0.30);
      text-align: center;
      box-sizing: border-box;
    }
    .pct-number {
      font-size: 38px;
      font-weight: 900;
      color: #ffd700;
      line-height: 1;
    }
    .pct-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .badges {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .badge-gold {
      font-size: 11px;
      color: #1b073a;
      background: #ffd700;
      border-radius: 999px;
      padding: 4px 14px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }
    .badge-glass {
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 4px 14px;
      font-weight: 700;
    }
    .hashtags {
      color: rgba(255,215,0,0.4);
      font-size: 10.5px;
      letter-spacing: 0.3px;
      line-height: 1.8;
      text-align: center;
    }
    /* Botones */
    .indicators {
      margin-top: 8px;
      font-size: 10.5px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.3px;
    }
    .btns {
      margin-top: 12px;
      display: flex;
      gap: 6px;
      width: 340px;
    }
    .btn {
      flex: 1;
      height: 36px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }
    .btn-wa { background: #25D366; box-shadow: 0 2px 8px rgba(37,211,102,0.4); }
    .btn-fb { background: #1877F2; box-shadow: 0 2px 8px rgba(24,119,242,0.4); }
    .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); box-shadow: 0 2px 8px rgba(220,39,67,0.4); }
    .btn-close {
      margin-top: 8px;
      width: 340px;
      height: 38px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #ffd700, #ff9500);
      color: #1a0533;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,215,0,0.4);
    }
    .label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
      width: 340px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>Preview · Tarjeta Logro Quiz</h2>

  <div class="card">
    <div class="overlay"></div>
    <div class="content">
      <div class="score-circle">
        <span class="score-number">4.8</span>
        <span class="score-denom">/5.0</span>
      </div>
      <div style="text-align:center">
        <div class="title">¡Lo lograste, María! 🎉</div>
        <div class="quiz-name">📚 <em>Bioseguridad básica</em></div>
      </div>
      <div class="pct-panel">
        <div class="pct-number">96%</div>
        <div class="pct-label">24 de 25 correctas</div>
      </div>
      <div class="badges">
        <span class="badge-gold">✓ APROBADO</span>
        <span class="badge-glass">🎯 Meta cumplida</span>
      </div>
      <div class="hashtags">
        #AcademiaCrystalDiamante · #Logro · #Aprendizaje
      </div>
    </div>
  </div>

  <div class="label" style="margin-top:14px">Comparte en</div>
  <div class="btns">
    <button class="btn btn-wa">💬 WhatsApp</button>
    <button class="btn btn-fb">📘 Facebook</button>
    <button class="btn btn-ig">📸 Instagram</button>
  </div>
  <button class="btn-close">🌟 ¡Ya presumí mi logro! Cerrar</button>
</body>
</html>
