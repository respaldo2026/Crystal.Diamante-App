<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview – Tarjeta Logro</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 48px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    h2 {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .panel {
      width: min(760px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .panel input,
    .panel select {
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 0 12px;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }
    .panel input::placeholder {
      color: rgba(255,255,255,0.45);
    }
    .panel .full {
      grid-column: 1 / -1;
    }
    .panel label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
    .hint {
      margin-top: 8px;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.48);
      font-size: 11px;
      letter-spacing: 0.3px;
      text-align: center;
    }
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      width: 340px;
      aspect-ratio: 9 / 16;
      background-image: url('quiz-card-bg.png');
      background-size: cover;
      background-position: center top;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      padding: 22px 20px 24px;
      box-sizing: border-box;
    }
    .overlay {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(to bottom, transparent 58%, rgba(10,5,30,0.62) 78%, rgba(10,5,30,0.9) 100%);
      pointer-events: none;
    }
    .content {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .top-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding-top: 30%;
    }
    .bottom-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: auto;
    }
    .score-circle {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
      box-shadow: 0 0 48px rgba(255,215,0,0.7), 0 6px 28px rgba(0,0,0,0.5);
    }
    .score-number {
      color: #1a0533;
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
    }
    .score-denom {
      color: rgba(26,5,51,0.65);
      font-size: 13px;
      font-weight: 700;
    }
    .title {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 4px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
      text-align: center;
    }
    .quiz-name {
      color: #ffe58f;
      font-size: 13px;
      font-weight: 800;
      font-style: italic;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      background: rgba(15, 8, 35, 0.42);
      border: 1px solid rgba(255,229,143,0.35);
      border-radius: 10px;
      padding: 5px 10px;
    }
    .pct-panel {
      width: 100%;
      padding: 12px 16px 10px;
      border-radius: 14px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,215,0,0.30);
      text-align: center;
      box-sizing: border-box;
    }
    .pct-number {
      font-size: 38px;
      font-weight: 900;
      color: #ffd700;
      line-height: 1;
    }
    .pct-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 3px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .badges {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .badge-gold {
      font-size: 11px;
      color: #1b073a;
      background: #ffd700;
      border-radius: 999px;
      padding: 4px 14px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }
    .badge-glass {
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 4px 14px;
      font-weight: 700;
    }
    .hashtags {
      color: rgba(255,215,0,0.4);
      font-size: 10.5px;
      letter-spacing: 0.3px;
      line-height: 1.8;
      text-align: center;
    }
    /* Botones */
    .indicators {
      margin-top: 8px;
      font-size: 10.5px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.3px;
    }
    .btns {
      margin-top: 12px;
      display: flex;
      gap: 6px;
      width: 340px;
    }
    .btn {
      flex: 1;
      height: 36px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }
    .btn-wa { background: #25D366; box-shadow: 0 2px 8px rgba(37,211,102,0.4); }
    .btn-fb { background: #1877F2; box-shadow: 0 2px 8px rgba(24,119,242,0.4); }
    .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); box-shadow: 0 2px 8px rgba(220,39,67,0.4); }
    .btn-close {
      margin-top: 8px;
      width: 340px;
      height: 38px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #ffd700, #ff9500);
      color: #1a0533;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,215,0,0.4);
    }
    .label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
      width: 340px;
      text-align: center;
    }
    @media (max-width: 760px) {
      .panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h2>Preview · Tarjeta Logro Quiz</h2>

  <div class="panel">
    <label>
      Fondo clase
      <select id="claseSelect"></select>
    </label>
    <label>
      Nombre estudiante
      <input id="nombreInput" type="text" value="Maria" />
    </label>
    <label>
      Titulo quiz
      <input id="quizInput" type="text" value="Bioseguridad basica" />
    </label>
    <label>
      Correctas / Total
      <input id="aciertosInput" type="text" value="24/25" />
    </label>
    <label>
      Nota /5.0
      <input id="notaInput" type="number" min="0" max="5" step="0.1" value="4.8" />
    </label>
    <label>
      Porcentaje
      <input id="pctInput" type="number" min="0" max="100" step="1" value="96" />
    </label>
  </div>

  <div class="hint">Usa Clase 1-12 para ver los fondos que acabas de subir.</div>

  <div class="card" id="card">
    <div class="overlay"></div>
    <div class="content">
      <div class="top-block">
        <div class="score-circle">
          <span class="score-number" id="scoreNumber">4.8</span>
          <span class="score-denom">/5.0</span>
        </div>
        <div style="text-align:center">
          <div class="title" id="titulo">¡Lo lograste, Maria! 🎉</div>
          <div class="quiz-name">📚 <em id="quizTitulo">Bioseguridad basica</em></div>
        </div>
      </div>

      <div class="bottom-block">
        <div class="pct-panel">
          <div class="pct-number" id="porcentaje">96%</div>
          <div class="pct-label" id="detalleAciertos">24 de 25 correctas</div>
        </div>
        <div class="badges">
          <span class="badge-gold">✓ APROBADO</span>
          <span class="badge-glass">🎯 Meta cumplida</span>
        </div>
        <div class="hashtags">
          #AcademiaCrystalDiamante · #Logro · #Aprendizaje
        </div>
      </div>
    </div>
  </div>

  <div class="label" style="margin-top:14px">Comparte en</div>
  <div class="btns">
    <button class="btn btn-wa">💬 WhatsApp</button>
    <button class="btn btn-fb">📘 Facebook</button>
    <button class="btn btn-ig">📸 Instagram</button>
  </div>
  <button class="btn-close">🌟 ¡Ya presumí mi logro! Cerrar</button>

  <script>
    const card = document.getElementById("card");
    const claseSelect = document.getElementById("claseSelect");
    const nombreInput = document.getElementById("nombreInput");
    const quizInput = document.getElementById("quizInput");
    const aciertosInput = document.getElementById("aciertosInput");
    const notaInput = document.getElementById("notaInput");
    const pctInput = document.getElementById("pctInput");
    const scoreNumber = document.getElementById("scoreNumber");
    const titulo = document.getElementById("titulo");
    const quizTitulo = document.getElementById("quizTitulo");
    const porcentaje = document.getElementById("porcentaje");
    const detalleAciertos = document.getElementById("detalleAciertos");

    function initClases() {
      for (let i = 1; i <= 12; i += 1) {
        const option = document.createElement("option");
        option.value = String(i);
        option.textContent = `Clase ${i}`;
        claseSelect.appendChild(option);
      }
      claseSelect.value = "1";
    }

    function updatePreview() {
      const clase = claseSelect.value || "1";
      const nota = Number(notaInput.value || 0).toFixed(1);
      const pct = Math.max(0, Math.min(100, Number(pctInput.value || 0)));
      const nombre = (nombreInput.value || "Maria").trim();
      const quiz = (quizInput.value || "Bioseguridad basica").trim();
      const aciertos = (aciertosInput.value || "24/25").trim();

      card.style.backgroundImage = `url('quiz-logros/clase-${clase}.png')`;
      scoreNumber.textContent = nota;
      titulo.textContent = `¡Lo lograste, ${nombre || "Estudiante"}! 🎉`;
      quizTitulo.textContent = quiz || "Quiz";
      porcentaje.textContent = `${pct}%`;

      const normalizedQuiz = (quiz || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
      const isBioseguridadBasica = normalizedQuiz.includes("bioseguridad basica");
      const overlay = document.querySelector('.overlay');
      if (overlay) {
        overlay.style.background = isBioseguridadBasica
          ? 'linear-gradient(to bottom, transparent 54%, rgba(8,4,24,0.72) 75%, rgba(8,4,24,0.94) 100%)'
          : 'linear-gradient(to bottom, transparent 58%, rgba(10,5,30,0.62) 78%, rgba(10,5,30,0.9) 100%)';
      }

      const chunks = aciertos.split("/").map((x) => x.trim());
      if (chunks.length === 2 && chunks[0] && chunks[1]) {
        detalleAciertos.textContent = `${chunks[0]} de ${chunks[1]} correctas`;
      } else {
        detalleAciertos.textContent = "24 de 25 correctas";
      }
    }

    initClases();
    [claseSelect, nombreInput, quizInput, aciertosInput, notaInput, pctInput].forEach((el) => {
      el.addEventListener("input", updatePreview);
      el.addEventListener("change", updatePreview);
    });
    updatePreview();
  </script>
</body>
</html>
